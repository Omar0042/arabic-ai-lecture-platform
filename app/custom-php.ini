; Custom PHP Configuration for University Platform on Windows
; File: custom-php.ini

; === File Upload Settings ===
upload_max_filesize = 500M
post_max_size = 550M
file_uploads = On

; === Memory and Execution Settings ===
memory_limit = 1G
max_execution_time = 300
max_input_time = 300

; === Essential Extensions for AI ===
extension=curl
extension=openssl
extension=json
extension=fileinfo
extension=mbstring

; === SSL/HTTPS Settings ===
allow_url_fopen = On
openssl.cafile = ""

; === Network Settings ===
default_socket_timeout = 60
user_agent = "PHP"

; === Date Settings ===
date.timezone = "Asia/Riyadh"

; === Error Reporting for Development ===
display_errors = On
error_reporting = E_ALL & ~E_NOTICE & ~E_DEPRECATED

; === Session Settings ===
session.save_path = ""
session.gc_maxlifetime = 1440

; === Output Settings ===
output_buffering = 4096

; === Windows Specific Settings ===
; Uncomment if you know your PHP installation path:
; extension_dir = "C:\php\ext"
; Uncomment if you have certificate bundle:
; curl.cainfo = "C:\php\extras\ssl\cacert.pem"