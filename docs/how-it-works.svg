<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl desc" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif">
  <title id="ttl">How it works</title>
  <desc id="desc">A teacher uploads a lecture video. The backend AI pipeline extracts audio with FFmpeg, transcribes it with Voxtral, summarizes it with Mistral, and stores the transcript and summary. A student asks a question and Mistral answers using only that saved transcript.</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#888780"/></marker>
    <marker id="ahb" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 Z" fill="#378ADD"/></marker>
  </defs>

  <rect x="3" y="3" width="754" height="494" rx="16" fill="#FAF8F2" stroke="#D3D1C7"/>
  <text x="380" y="36" text-anchor="middle" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#888780">HOW IT WORKS</text>

  <!-- Teacher -->
  <rect x="280" y="52" width="200" height="58" rx="12" fill="#FFFFFF" stroke="#D3D1C7"/>
  <circle cx="310" cy="81" r="15" fill="#F1EFE8" stroke="#D3D1C7"/>
  <path d="M310,87 L310,75 M305,80 L310,74.5 L315,80" fill="none" stroke="#5F5E5A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="334" y="79" font-size="14" font-weight="700" fill="#2C2C2A">Teacher</text>
  <text x="334" y="96" font-size="11" fill="#5F5E5A">uploads a lecture video</text>

  <line x1="380" y1="110" x2="380" y2="141" stroke="#888780" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="388" y="129" font-size="10" fill="#888780">video</text>

  <!-- Backend -->
  <rect x="36" y="146" width="688" height="214" rx="16" fill="#FFFFFF" stroke="#85B7EB" stroke-width="1.6"/>
  <rect x="230" y="132" width="300" height="28" rx="14" fill="#185FA5"/>
  <text x="380" y="150" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.4" fill="#FFFFFF">BACKEND · AI INTEGRATION (MY PART)</text>
  <text x="56" y="184" font-size="11" fill="#888780">Runs automatically on upload</text>

  <rect x="56" y="192" width="138" height="58" rx="10" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="125" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#185FA5">Extract audio</text>
  <text x="125" y="235" text-anchor="middle" font-size="10.5" fill="#5F5E5A">FFmpeg</text>
  <rect x="218" y="192" width="138" height="58" rx="10" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="287" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#185FA5">Transcribe</text>
  <text x="287" y="235" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Voxtral</text>
  <rect x="380" y="192" width="138" height="58" rx="10" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="449" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#185FA5">Summarize</text>
  <text x="449" y="235" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Mistral Large</text>
  <rect x="542" y="192" width="138" height="58" rx="10" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="611" y="218" text-anchor="middle" font-size="12.5" font-weight="700" fill="#185FA5">Store</text>
  <text x="611" y="235" text-anchor="middle" font-size="10.5" fill="#5F5E5A">transcript + summary</text>

  <line x1="196" y1="221" x2="216" y2="221" stroke="#378ADD" stroke-width="1.6" marker-end="url(#ahb)"/>
  <line x1="358" y1="221" x2="378" y2="221" stroke="#378ADD" stroke-width="1.6" marker-end="url(#ahb)"/>
  <line x1="520" y1="221" x2="540" y2="221" stroke="#378ADD" stroke-width="1.6" marker-end="url(#ahb)"/>

  <line x1="56" y1="270" x2="704" y2="270" stroke="#ECEAE2" stroke-width="1"/>
  <text x="56" y="288" font-size="11" fill="#888780">Then, for every student question:</text>

  <rect x="170" y="296" width="420" height="52" rx="12" fill="#E6F1FB" stroke="#85B7EB"/>
  <text x="380" y="318" text-anchor="middle" font-size="12.5" font-weight="700" fill="#185FA5">Answer the question</text>
  <text x="380" y="335" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Mistral · from the saved transcript</text>

  <path d="M611,250 L611,274 Q611,296 591,296" fill="none" stroke="#378ADD" stroke-width="1.5" marker-end="url(#ahb)"/>

  <!-- Student -->
  <rect x="280" y="400" width="200" height="58" rx="12" fill="#FFFFFF" stroke="#D3D1C7"/>
  <circle cx="310" cy="429" r="15" fill="#F1EFE8" stroke="#D3D1C7"/>
  <text x="310" y="434" text-anchor="middle" font-size="15" font-weight="700" fill="#5F5E5A">?</text>
  <text x="334" y="427" font-size="14" font-weight="700" fill="#2C2C2A">Student</text>
  <text x="334" y="444" font-size="11" fill="#5F5E5A">asks a question</text>

  <line x1="350" y1="399" x2="350" y2="350" stroke="#888780" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="343" y="378" text-anchor="end" font-size="10" fill="#888780">question</text>
  <line x1="416" y1="350" x2="416" y2="399" stroke="#888780" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="423" y="378" font-size="10" fill="#888780">answer</text>
</svg>
